<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>話して</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Space+Mono&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:#000;font-family:'Noto Serif JP',serif;}

/* ── CANVAS ── */
#canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 24px 0;
}
.nav-links{display:flex;gap:22px;}
.nav-links a{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.35);text-decoration:none;
  transition:color .2s;cursor:pointer;
}
.nav-links a:hover,.nav-links a.active{color:rgba(255,255,255,.8);}

/* ── AI NAME BAR ── */
#ai-bar{
  position:fixed;top:52px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.4);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
  padding:7px 16px;border-radius:99px;
}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#4ecdc4;box-shadow:0 0 8px #4ecdc4;}
.ai-dot.speaking{animation:dotPulse .6s ease infinite alternate;}
@keyframes dotPulse{from{transform:scale(1);opacity:1;}to{transform:scale(1.5);opacity:.5;}}
#ai-bar span{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.08em;}

/* ── UPLOAD SCREEN ── */
#upload-screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
}
.upload-icon{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;
}
.upload-icon:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3);}
.upload-title{
  font-family:'Noto Serif JP',serif;font-weight:200;
  font-size:22px;color:rgba(255,255,255,.8);letter-spacing:.08em;
}
.upload-sub{
  font-size:12px;color:rgba(255,255,255,.35);text-align:center;line-height:1.8;
  font-family:'Space Mono',monospace;letter-spacing:.04em;
}
#select-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.7);font-family:'Space Mono',monospace;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:10px 24px;cursor:pointer;transition:all .2s;margin-top:8px;
}
#select-btn:hover{background:rgba(255,255,255,.12);}
#file-input{display:none;}

/* ── CHAT LAYER ── */
#chat-layer{
  position:fixed;inset:0;z-index:15;
  display:flex;flex-direction:column;
  pointer-events:none;
  display:none;
}

/* AI bubble */
#ai-bubble{
  position:absolute;
  left:50%;transform:translateX(-50%);
  width:85%;max-width:360px;
  top:50%;margin-top:-60px;
  pointer-events:all;
}
.bubble-text{
  background:rgba(15,15,20,.65);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  padding:16px 20px;
  font-size:15px;font-weight:300;line-height:1.8;
  color:rgba(255,255,255,.9);
  letter-spacing:.04em;
  opacity:0;transition:opacity .4s;
}
.bubble-text.visible{opacity:1;}
.bubble-actions{
  display:flex;gap:8px;margin-top:8px;
}
.bub-btn{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5);padding:5px 10px;cursor:pointer;
  transition:all .2s;
}
.bub-btn:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.4);}
.bub-btn.save-btn{color:#4ecdc4;border-color:rgba(78,205,196,.4);}
.bub-btn.save-btn:hover{background:rgba(78,205,196,.1);}
.translation-text{
  font-size:12px;color:rgba(255,255,255,.45);
  margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);
  display:none;font-style:italic;line-height:1.7;
}
.translation-text.show{display:block;}

/* Correction */
.correction-box{
  margin-top:10px;
  background:rgba(196,92,60,.12);border:1px solid rgba(196,92,60,.3);
  border-left:2px solid #c45c3c;padding:10px 14px;
  font-size:12px;line-height:1.8;
  display:none;
}
.correction-box.show{display:block;}
.corr-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:#c45c3c;margin-bottom:5px;}
.corr-del{color:#c45c3c;text-decoration:line-through;opacity:.8;}
.corr-ins{color:#6aab7a;}
.corr-exp{margin-top:5px;color:rgba(255,255,255,.4);font-size:11px;}

/* ── INPUT BAR ── */
#input-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:12px 16px 28px;
  background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 100%);
  display:none;
}
.input-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);padding:10px 14px;
}
#text-input{
  flex:1;background:none;border:none;outline:none;
  color:rgba(255,255,255,.8);font-family:'Noto Serif JP',serif;
  font-size:15px;font-weight:300;
}
#text-input::placeholder{color:rgba(255,255,255,.25);font-style:italic;}
.mic-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.mic-btn.rec{background:rgba(196,92,60,.2);border-color:#c45c3c;color:#c45c3c;animation:recPulse 1s ease infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,92,60,.5);}50%{box-shadow:0 0 0 8px rgba(196,92,60,0);}}
.send-btn{
  width:36px;height:36px;flex-shrink:0;
  background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.25);
  color:#4ecdc4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.send-btn:hover{background:rgba(78,205,196,.2);}

/* Upload another */
#upload-another{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:20;display:none;
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.3);background:none;
  border:1px solid rgba(255,255,255,.1);padding:6px 12px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
#upload-another:hover{color:rgba(255,255,255,.6);}

/* ── MEMORY PANEL ── */
#memory-panel{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.93);backdrop-filter:blur(12px);
  display:none;flex-direction:column;
  padding:0 20px 32px;overflow-y:auto;
}
#memory-panel.open{display:flex;}
.panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 0 16px;border-bottom:1px solid rgba(255,255,255,.08);
  margin-bottom:20px;position:sticky;top:0;
  background:rgba(0,0,0,.93);z-index:1;
}
.panel-title{
  font-family:'Noto Serif JP',serif;font-weight:200;
  font-size:18px;color:rgba(255,255,255,.8);letter-spacing:.1em;
}
.panel-close{
  background:none;border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;
  font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:.08em;
  transition:all .2s;
}
.panel-close:hover{color:rgba(255,255,255,.8);}

.memory-item{
  border:1px solid rgba(255,255,255,.07);
  margin-bottom:14px;overflow:hidden;
  animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.mi-img-row{position:relative;height:120px;overflow:hidden;background:#111;}
.mi-img-row canvas{width:100%;height:100%;object-fit:cover;}
.mi-timestamp{
  position:absolute;top:8px;left:10px;
  font-family:'Space Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.5);letter-spacing:.08em;
  background:rgba(0,0,0,.5);padding:2px 6px;
}
.mi-body{padding:12px 14px;}
.mi-label{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.25);margin-bottom:5px;
}
.mi-user-text{
  font-size:14px;color:rgba(255,255,255,.6);
  margin-bottom:8px;font-style:italic;line-height:1.6;
}
.mi-ai-text{
  font-size:14px;color:rgba(255,255,255,.85);
  line-height:1.7;margin-bottom:8px;
}
.mi-zh{
  font-size:11px;color:rgba(255,255,255,.35);
  line-height:1.6;border-top:1px solid rgba(255,255,255,.06);
  padding-top:7px;margin-bottom:8px;font-style:italic;
}
.mi-correction{
  background:rgba(196,92,60,.08);border-left:2px solid #c45c3c;
  padding:8px 10px;font-size:11px;color:rgba(255,255,255,.5);
  margin-bottom:8px;
}
.mi-actions{display:flex;gap:8px;}
.mi-btn{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.4);padding:5px 10px;cursor:pointer;
  transition:all .2s;
}
.mi-btn:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.3);}
.mi-btn.playing{color:#4ecdc4;border-color:rgba(78,205,196,.4);}

/* No memories */
.no-memories{
  text-align:center;padding:60px 0;
  color:rgba(255,255,255,.2);font-size:13px;
  font-family:'Space Mono',monospace;letter-spacing:.08em;
}

/* typing dots */
.typing-dots{display:inline-flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5);animation:tdot 1.2s ease infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<nav>
  <div class="nav-links">
    <a class="active" onclick="showScreen('chat')">話す</a>
    <a onclick="openMemory()">記憶</a>
    <a onclick="showInfo()">情報</a>
  </div>
</nav>

<div id="ai-bar">
  <div class="ai-dot" id="ai-dot"></div>
  <span>話して</span>
</div>

<!-- Upload screen -->
<div id="upload-screen">
  <div class="upload-icon" onclick="document.getElementById('file-input').click()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </div>
  <div class="upload-title">記憶を共有する</div>
  <div class="upload-sub">写真をアップロードしてください<br>一緒に日本語で話しましょう</div>
  <button id="select-btn" onclick="document.getElementById('file-input').click()">Select Image</button>
  <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
</div>

<!-- Chat layer -->
<div id="chat-layer">
  <div id="ai-bubble">
    <div class="bubble-text" id="bubble-text"></div>
    <div class="correction-box" id="correction-box">
      <div class="corr-label">✦ 表現の訂正</div>
      <div id="corr-content"></div>
    </div>
    <div class="bubble-actions" id="bubble-actions" style="display:none">
      <button class="bub-btn" id="replay-btn" onclick="replayAudio()">▶ replay</button>
      <button class="bub-btn" id="trans-btn" onclick="toggleBubbleTrans()">中文</button>
      <button class="bub-btn save-btn" id="save-btn" onclick="saveMemory()">Save Memory ›</button>
    </div>
    <div class="translation-text" id="translation-text"></div>
  </div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <div class="input-row">
    <input type="text" id="text-input" placeholder="日本語で話しかけてください…"
      onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<button id="upload-another" onclick="resetToUpload()">← upload another</button>

<!-- Memory panel -->
<div id="memory-panel">
  <div class="panel-header">
    <div class="panel-title">記憶の断片</div>
    <button class="panel-close" onclick="closeMemory()">× 閉じる</button>
  </div>
  <div id="memory-list"></div>
</div>

<script>
/* ═══════════════════════════════════════
   PARTICLE ENGINE
═══════════════════════════════════════ */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], imgData = null, animFrame;
let dissolveProgress = 0; // 0=intact 1=fully dissolved
let dissolveDir = 1; // 1=dissolving -1=reconstituting

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (imgData) spawnParticles(); });

class Particle {
  constructor(x, y, color) {
    this.ox = x; this.oy = y; // original
    this.x = x; this.y = y;
    this.color = color;
    this.size = Math.random() * 1.8 + 0.4;
    this.vx = (Math.random() - .5) * 3;
    this.vy = (Math.random() - .5) * 3 - Math.random() * 1.5;
    this.life = Math.random();
    this.speed = Math.random() * 0.008 + 0.003;
    this.scattered = false;
  }
  update(progress) {
    if (progress < .05) {
      this.x += (this.ox - this.x) * 0.08;
      this.y += (this.oy - this.y) * 0.08;
    } else {
      this.life += this.speed;
      if (this.life > 1) {
        this.life = 0;
        this.x = this.ox + (Math.random()-.5)*4;
        this.y = this.oy + (Math.random()-.5)*4;
      }
      const d = progress;
      this.x += this.vx * d * 0.7;
      this.y += this.vy * d * 0.7;
      this.vx += (Math.random()-.5) * 0.1;
      this.vy += -0.02 + (Math.random()-.5)*0.05;
      this.vx *= 0.98;
      this.vy *= 0.98;
      // wrap
      if (this.x < 0) this.x = W;
      if (this.x > W) this.x = 0;
      if (this.y > H + 20) { this.y = 0; this.x = Math.random()*W; }
    }
  }
  draw() {
    const alpha = dissolveProgress < .05 ? 1 : Math.max(0, 1 - dissolveProgress * 0.5 + Math.random()*0.1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function spawnParticles() {
  if (!imgData) return;
  particles = [];
  const offscreen = document.createElement('canvas');
  const aspect = imgData.width / imgData.height;
  let dw, dh, dx, dy;
  if (W / H > aspect) { dh = H; dw = dh * aspect; }
  else { dw = W; dh = dw / aspect; }
  dx = (W - dw) / 2; dy = (H - dh) / 2;

  offscreen.width = dw; offscreen.height = dh;
  const oc = offscreen.getContext('2d');
  oc.drawImage(imgData, 0, 0, dw, dh);
  const pix = oc.getImageData(0, 0, dw, dh);
  const step = Math.max(2, Math.floor(dw * dh / 18000));

  for (let i = 0; i < pix.data.length; i += 4 * step) {
    const pi = i / 4;
    const px = (pi % dw) + dx;
    const py = Math.floor(pi / dw) + dy;
    const r = pix.data[i], g = pix.data[i+1], b = pix.data[i+2], a = pix.data[i+3];
    if (a < 20) continue;
    const brightness = (r + g + b) / 3;
    if (brightness < 15 && Math.random() > .3) continue;
    particles.push(new Particle(px, py, `rgba(${r},${g},${b},${a/255})`));
  }
}

function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // slow auto-dissolve over time
  dissolveProgress = Math.min(1, dissolveProgress + 0.0004);

  particles.forEach(p => { p.update(dissolveProgress); p.draw(); });
  ctx.globalAlpha = 1;
  animFrame = requestAnimationFrame(drawFrame);
}

/* ═══════════════════════════════════════
   IMAGE LOAD
═══════════════════════════════════════ */
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    imgData = img;
    dissolveProgress = 0;
    spawnParticles();
    cancelAnimationFrame(animFrame);
    drawFrame();
    showChatUI();
  };
  img.src = URL.createObjectURL(file);
}

function showChatUI() {
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('chat-layer').style.display = 'flex';
  document.getElementById('input-bar').style.display = 'block';
  document.getElementById('upload-another').style.display = 'block';
  // greeting
  setTimeout(() => showAIBubble('こんにちは。この写真について日本語で話しましょう。どんな思い出ですか？', '你好。让我们用日语聊聊这张照片吧。有什么回忆吗？', null), 800);
}

function resetToUpload() {
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('chat-layer').style.display = 'none';
  document.getElementById('input-bar').style.display = 'none';
  document.getElementById('upload-another').style.display = 'none';
  hideBubble();
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0,0,W,H);
  particles = [];
  dissolveProgress = 0;
  conversationHistory = [];
  currentAiText = ''; currentZh = ''; currentCorrection = null;
  currentAudioBlob = null;
  document.getElementById('file-input').value = '';
}

/* ═══════════════════════════════════════
   CONVERSATION
═══════════════════════════════════════ */
const SYSTEM = `あなたは「話して」という日本語会話練習AIです。ユーザーが日本語で話しかけてきます。写真について話すか、自由に会話してください。

以下のJSON形式で返してください（コードブロック不要）：
{
  "reply": "日本語での返答",
  "translation_zh": "中国語訳",
  "correction": null または {"original":"誤り","corrected":"正しい表現","explanation_zh":"中国語説明"}
}`;

let conversationHistory = [];
let currentAiText = '', currentZh = '', currentCorrection = null;
let currentAudioBlob = null;
let memories = [];

async function sendMessage() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await processInput(text);
}

async function processInput(text) {
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text;
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch { parsed = { reply: raw, translation_zh: '', correction: null }; }

    conversationHistory.push({ role: 'assistant', content: parsed.reply });
    currentAiText = parsed.reply;
    currentZh = parsed.translation_zh || '';
    currentCorrection = parsed.correction || null;
    currentAudioBlob = null;

    hideBubble();
    showAIBubble(parsed.reply, parsed.translation_zh, parsed.correction);
    speakJapanese(parsed.reply);

  } catch(err) {
    hideBubble();
    showAIBubble('エラーが発生しました。もう一度お試しください。', err.message, null);
  }
}

/* ═══════════════════════════════════════
   BUBBLE UI
═══════════════════════════════════════ */
function showTyping() {
  const bt = document.getElementById('bubble-text');
  bt.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  bt.classList.add('visible');
  document.getElementById('bubble-actions').style.display = 'none';
  document.getElementById('correction-box').classList.remove('show');
  document.getElementById('translation-text').classList.remove('show');
}

function showAIBubble(text, zh, correction) {
  const bt = document.getElementById('bubble-text');
  bt.textContent = text;
  bt.classList.add('visible');

  document.getElementById('translation-text').textContent = zh || '';
  document.getElementById('translation-text').classList.remove('show');
  document.getElementById('trans-btn').textContent = '中文';

  if (correction) {
    document.getElementById('corr-content').innerHTML =
      `<span class="corr-del">${esc(correction.original)}</span> → <span class="corr-ins">${esc(correction.corrected)}</span><div class="corr-exp">${esc(correction.explanation_zh)}</div>`;
    document.getElementById('correction-box').classList.add('show');
  } else {
    document.getElementById('correction-box').classList.remove('show');
  }

  document.getElementById('bubble-actions').style.display = 'flex';
  document.getElementById('save-btn').textContent = 'Save Memory ›';
}

function hideBubble() {
  document.getElementById('bubble-text').classList.remove('visible');
  document.getElementById('bubble-actions').style.display = 'none';
}

function toggleBubbleTrans() {
  const t = document.getElementById('translation-text');
  const btn = document.getElementById('trans-btn');
  const on = t.classList.toggle('show');
  btn.textContent = on ? '中文 ▲' : '中文';
}

/* ═══════════════════════════════════════
   TTS — Web Speech API
═══════════════════════════════════════ */
let currentUtterance = null;
function speakJapanese(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const dot = document.getElementById('ai-dot');
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.9;
  utt.pitch = 1.05;
  // try to pick Japanese voice
  const voices = window.speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) utt.voice = jpVoice;

  utt.onstart = () => dot.classList.add('speaking');
  utt.onend = () => dot.classList.remove('speaking');
  currentUtterance = utt;
  window.speechSynthesis.speak(utt);
}

function replayAudio() {
  if (currentAiText) speakJapanese(currentAiText);
}

/* ═══════════════════════════════════════
   VOICE INPUT
═══════════════════════════════════════ */
let recognition = null, isRecording = false;

function toggleMic() {
  isRecording ? stopRec() : startRec();
}

function startRec() {
  if (!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) {
    alert('このブラウザは音声入力に対応していません');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('rec');
  };
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('text-input').value = t;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('rec');
    const t = document.getElementById('text-input').value.trim();
    if (t) sendMessage();
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('rec');
  };
  recognition.start();
}

function stopRec() {
  if (recognition) recognition.stop();
}

/* ═══════════════════════════════════════
   SAVE MEMORY
═══════════════════════════════════════ */
function saveMemory() {
  if (!currentAiText) return;

  // Snapshot canvas as thumbnail
  const thumb = document.createElement('canvas');
  thumb.width = canvas.width; thumb.height = canvas.height;
  thumb.getContext('2d').drawImage(canvas, 0, 0);

  const userText = conversationHistory.filter(m=>m.role==='user').slice(-1)[0]?.content || '';

  memories.unshift({
    id: Date.now(),
    timestamp: new Date().toLocaleString('ja-JP'),
    thumb,
    userText,
    aiText: currentAiText,
    zh: currentZh,
    correction: currentCorrection,
  });

  document.getElementById('save-btn').textContent = '✓ Saved';
}

/* ═══════════════════════════════════════
   MEMORY PANEL
═══════════════════════════════════════ */
function openMemory() {
  const list = document.getElementById('memory-list');
  if (memories.length === 0) {
    list.innerHTML = '<div class="no-memories">まだ記憶がありません<br>会話を保存してください</div>';
  } else {
    list.innerHTML = memories.map(m => `
      <div class="memory-item" id="mi-${m.id}">
        <div class="mi-img-row">
          <canvas id="thumb-${m.id}" width="${m.thumb.width}" height="${m.thumb.height}"
            style="width:100%;height:120px;object-fit:cover;"></canvas>
          <div class="mi-timestamp">${m.timestamp}</div>
        </div>
        <div class="mi-body">
          ${m.userText ? `<div class="mi-label">あなた</div><div class="mi-user-text">${esc(m.userText)}</div>` : ''}
          <div class="mi-label">AI · 話して</div>
          <div class="mi-ai-text">${esc(m.aiText)}</div>
          ${m.zh ? `<div class="mi-zh">${esc(m.zh)}</div>` : ''}
          ${m.correction ? `<div class="mi-correction">
            <span style="color:#c45c3c;text-decoration:line-through">${esc(m.correction.original)}</span>
            → <span style="color:#6aab7a">${esc(m.correction.corrected)}</span><br>
            <span style="font-size:10px">${esc(m.correction.explanation_zh)}</span>
          </div>` : ''}
          <div class="mi-actions">
            <button class="mi-btn" id="play-btn-${m.id}" onclick="playMemory(${m.id},'${esc(m.aiText)}')">▶ 再生</button>
            <button class="mi-btn" onclick="deleteMemory(${m.id})">× 削除</button>
          </div>
        </div>
      </div>
    `).join('');

    // Draw thumbnails
    memories.forEach(m => {
      const tc = document.getElementById(`thumb-${m.id}`);
      if (tc) tc.getContext('2d').drawImage(m.thumb, 0, 0);
    });
  }
  document.getElementById('memory-panel').classList.add('open');
}

function closeMemory() {
  document.getElementById('memory-panel').classList.remove('open');
}

function playMemory(id, text) {
  const btn = document.getElementById(`play-btn-${id}`);
  if (!text) return;
  btn.classList.add('playing');
  btn.textContent = '▶ 再生中...';
  speakJapanese(text);
  const utt = currentUtterance;
  if (utt) {
    utt.onend = () => {
      btn.classList.remove('playing');
      btn.textContent = '▶ 再生';
    };
  }
}

function deleteMemory(id) {
  memories = memories.filter(m => m.id !== id);
  document.getElementById(`mi-${id}`)?.remove();
  if (memories.length === 0) {
    document.getElementById('memory-list').innerHTML =
      '<div class="no-memories">まだ記憶がありません<br>会話を保存してください</div>';
  }
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showScreen(s) {}
function showInfo() {
  alert('話して — 日本語AI会話練習\n\n写真をアップロードして、AIと日本語で会話しましょう。\n文法の誤りは自動的に訂正されます。');
}

// Load voices async
window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener?.('voiceschanged', () => window.speechSynthesis.getVoices());
