<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>話して</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Space+Mono&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:#000;font-family:'Noto Serif JP',serif;}

#canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 24px 0;
}
.nav-links{display:flex;gap:22px;}
.nav-links button{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.35);
  background:none;border:none;cursor:pointer;padding:4px 0;
  transition:color .2s;
}
.nav-links button:hover,.nav-links button.active{color:rgba(255,255,255,.8);}

#ai-bar{
  position:fixed;top:52px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.4);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
  padding:7px 18px;border-radius:99px;
}
.ai-dot{
  width:8px;height:8px;border-radius:50%;
  background:#4ecdc4;box-shadow:0 0 8px #4ecdc4;
  transition:all .3s;
}
.ai-dot.speaking{animation:dotPulse .5s ease infinite alternate;}
.ai-dot.listening{background:#e8a84c;box-shadow:0 0 8px #e8a84c;animation:dotPulse .3s ease infinite alternate;}
.ai-dot.thinking{background:rgba(255,255,255,.4);animation:dotSpin 1s linear infinite;}
@keyframes dotPulse{from{transform:scale(1);}to{transform:scale(1.6);opacity:.5;}}
@keyframes dotSpin{0%{box-shadow:0 0 8px #4ecdc4;}50%{box-shadow:0 0 16px #4ecdc4;}100%{box-shadow:0 0 8px #4ecdc4;}}
#ai-bar span{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.08em;}

/* Upload */
#upload-screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.upload-icon{
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.5);cursor:pointer;transition:all .25s;
}
.upload-icon:hover{background:rgba(255,255,255,.12);}
.upload-title{font-family:'Noto Serif JP',serif;font-weight:200;font-size:22px;color:rgba(255,255,255,.8);letter-spacing:.1em;}
.upload-sub{font-size:11px;color:rgba(255,255,255,.3);text-align:center;line-height:2;font-family:'Space Mono',monospace;letter-spacing:.05em;}
#select-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.6);font-family:'Space Mono',monospace;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:11px 28px;cursor:pointer;transition:all .2s;margin-top:4px;
}
#select-btn:hover{background:rgba(255,255,255,.11);}
#file-input{display:none;}

/* Chat layer */
#chat-layer{position:fixed;inset:0;z-index:15;display:none;pointer-events:none;}

#ai-bubble{
  position:absolute;left:50%;transform:translateX(-50%);
  width:88%;max-width:380px;
  bottom:130px;
  pointer-events:all;
}
.bubble-text{
  background:rgba(10,10,15,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);
  padding:16px 20px;
  font-size:15px;font-weight:300;line-height:1.85;
  color:rgba(255,255,255,.92);letter-spacing:.04em;
  opacity:0;transition:opacity .4s;min-height:52px;
}
.bubble-text.visible{opacity:1;}

.bubble-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.bub-btn{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.45);padding:6px 11px;cursor:pointer;transition:all .2s;
}
.bub-btn:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.35);}
.bub-btn.save-btn{color:#4ecdc4;border-color:rgba(78,205,196,.35);}
.bub-btn.active{color:#e8a84c;border-color:rgba(232,168,76,.4);}

.translation-text{
  font-size:12px;color:rgba(255,255,255,.4);margin-top:8px;
  padding-top:8px;border-top:1px solid rgba(255,255,255,.07);
  display:none;font-style:italic;line-height:1.75;
}
.translation-text.show{display:block;}

.correction-box{
  margin-top:10px;background:rgba(196,92,60,.1);
  border:1px solid rgba(196,92,60,.28);border-left:2px solid #c45c3c;
  padding:10px 14px;font-size:12px;line-height:1.8;display:none;
}
.correction-box.show{display:block;}
.corr-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:#c45c3c;margin-bottom:5px;}
.corr-del{color:#c45c3c;text-decoration:line-through;opacity:.8;}
.corr-ins{color:#6aab7a;}
.corr-exp{margin-top:5px;color:rgba(255,255,255,.38);font-size:11px;}

/* Input bar */
#input-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:10px 16px 32px;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
  display:none;
}
.input-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);padding:10px 14px;
}
#text-input{
  flex:1;background:none;border:none;outline:none;
  color:rgba(255,255,255,.85);font-family:'Noto Serif JP',serif;
  font-size:15px;font-weight:300;
}
#text-input::placeholder{color:rgba(255,255,255,.2);font-style:italic;}
.mic-btn{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.55);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.mic-btn.rec{
  background:rgba(232,168,76,.15);border-color:rgba(232,168,76,.5);
  color:#e8a84c;animation:recPulse 1s ease infinite;
}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,168,76,.4);}50%{box-shadow:0 0 0 8px rgba(232,168,76,0);}}
.send-btn{
  width:40px;height:40px;flex-shrink:0;
  background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.22);
  color:#4ecdc4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.send-btn:hover{background:rgba(78,205,196,.18);}

#upload-another{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:20;display:none;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.25);
  background:none;border:1px solid rgba(255,255,255,.09);
  padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
#upload-another:hover{color:rgba(255,255,255,.55);}

/* Error toast */
#toast{
  position:fixed;top:100px;left:50%;transform:translateX(-50%);
  z-index:50;background:rgba(196,92,60,.9);backdrop-filter:blur(8px);
  color:white;font-family:'Space Mono',monospace;font-size:11px;
  padding:10px 18px;letter-spacing:.06em;
  opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center;
}
#toast.show{opacity:1;}

/* Memory panel */
#memory-panel{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.94);backdrop-filter:blur(14px);
  display:none;flex-direction:column;
  padding:0 20px 32px;overflow-y:auto;
}
#memory-panel.open{display:flex;}
.panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 0 16px;border-bottom:1px solid rgba(255,255,255,.07);
  margin-bottom:20px;position:sticky;top:0;
  background:rgba(0,0,0,.94);z-index:1;
}
.panel-title{font-family:'Noto Serif JP',serif;font-weight:200;font-size:18px;color:rgba(255,255,255,.8);letter-spacing:.1em;}
.panel-close{
  background:none;border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;
  font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:.08em;transition:all .2s;
}
.panel-close:hover{color:rgba(255,255,255,.8);}
.memory-item{border:1px solid rgba(255,255,255,.07);margin-bottom:14px;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.mi-thumb{width:100%;height:110px;object-fit:cover;display:block;background:#111;}
.mi-body{padding:12px 14px;}
.mi-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:4px;}
.mi-user{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px;font-style:italic;line-height:1.6;}
.mi-ai{font-size:14px;color:rgba(255,255,255,.85);line-height:1.75;margin-bottom:7px;}
.mi-zh{font-size:11px;color:rgba(255,255,255,.32);line-height:1.6;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;margin-bottom:8px;font-style:italic;}
.mi-correction{background:rgba(196,92,60,.08);border-left:2px solid #c45c3c;padding:7px 10px;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:8px;line-height:1.7;}
.mi-time{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);margin-bottom:8px;}
.mi-actions{display:flex;gap:8px;}
.mi-btn{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);padding:5px 10px;cursor:pointer;transition:all .2s;
}
.mi-btn:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.3);}
.mi-btn.playing{color:#4ecdc4;border-color:rgba(78,205,196,.4);}
.no-memories{text-align:center;padding:60px 0;color:rgba(255,255,255,.18);font-size:12px;font-family:'Space Mono',monospace;letter-spacing:.08em;line-height:2;}

.typing-dots{display:inline-flex;gap:5px;align-items:center;padding:6px 0;}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45);animation:td 1.2s ease infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{opacity:.25;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<nav>
  <div class="nav-links">
    <button class="active" onclick="showChat()">話す</button>
    <button onclick="openMemory()">記憶</button>
  </div>
</nav>

<div id="ai-bar">
  <div class="ai-dot" id="ai-dot"></div>
  <span id="ai-status">話して</span>
</div>

<div id="upload-screen">
  <div class="upload-icon" onclick="document.getElementById('file-input').click()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </div>
  <div class="upload-title">記憶を共有する</div>
  <div class="upload-sub">写真をアップロードして<br>日本語で話しましょう</div>
  <button id="select-btn" onclick="document.getElementById('file-input').click()">写真を選ぶ</button>
  <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
</div>

<div id="chat-layer">
  <div id="ai-bubble">
    <div class="bubble-text" id="bubble-text"></div>
    <div class="correction-box" id="correction-box">
      <div class="corr-label">✦ 表現の訂正</div>
      <div id="corr-content"></div>
    </div>
    <div class="bubble-actions" id="bubble-actions" style="display:none">
      <button class="bub-btn" id="replay-btn" onclick="replayTTS()">▶ 再生</button>
      <button class="bub-btn" id="trans-btn" onclick="toggleTrans()">中文</button>
      <button class="bub-btn save-btn" id="save-btn" onclick="saveMemory()">Save Memory ›</button>
    </div>
    <div class="translation-text" id="translation-text"></div>
  </div>
</div>

<div id="input-bar">
  <div class="input-row">
    <input type="text" id="text-input" placeholder="日本語で話しかけてください…"
      onkeydown="if(event.key==='Enter')sendText()">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" onclick="sendText()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<button id="upload-another" onclick="resetUpload()">← 別の写真</button>

<div id="toast"></div>

<div id="memory-panel">
  <div class="panel-header">
    <div class="panel-title">記憶の断片</div>
    <button class="panel-close" onclick="closeMemory()">× 閉じる</button>
  </div>
  <div id="memory-list"></div>
</div>

<script>
const API = 'https://lfyvmnmqrnpxctsaahtt.supabase.co/functions/v1/hanashite';

/* ══════════════════════════════
   PARTICLE ENGINE
══════════════════════════════ */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], imgEl = null, raf;
let dissolve = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); if (imgEl) spawnParticles(); });

class P {
  constructor(x, y, color) {
    this.ox = x; this.oy = y; this.x = x; this.y = y; this.color = color;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random()-.5)*2.5; this.vy = (Math.random()-.5)*2.5 - Math.random();
    this.life = Math.random(); this.sp = Math.random()*.006+.002;
  }
  tick(d) {
    if (d < .04) { this.x += (this.ox-this.x)*.1; this.y += (this.oy-this.y)*.1; return; }
    this.life += this.sp;
    if (this.life > 1) { this.life=0; this.x=this.ox+(Math.random()-.5)*3; this.y=this.oy+(Math.random()-.5)*3; }
    this.x += this.vx*d*.6; this.y += this.vy*d*.6;
    this.vx += (Math.random()-.5)*.08; this.vy += -.015+(Math.random()-.5)*.04;
    this.vx *= .98; this.vy *= .98;
    if (this.x<0) this.x=W; if (this.x>W) this.x=0;
    if (this.y>H+10) { this.y=-5; this.x=Math.random()*W; }
  }
  draw() {
    ctx.globalAlpha = dissolve < .04 ? 1 : Math.max(0,.95-dissolve*.45+Math.random()*.08);
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.s, this.s);
  }
}

function spawnParticles() {
  particles = [];
  const off = document.createElement('canvas');
  const asp = imgEl.width/imgEl.height;
  let dw, dh;
  if (W/H > asp) { dh=H; dw=dh*asp; } else { dw=W; dh=dw/asp; }
  const dx=(W-dw)/2, dy=(H-dh)/2;
  off.width=dw; off.height=dh;
  const oc=off.getContext('2d');
  oc.drawImage(imgEl,0,0,dw,dh);
  const px=oc.getImageData(0,0,dw,dh);
  const step=Math.max(2,Math.floor(dw*dh/16000));
  for (let i=0;i<px.data.length;i+=4*step) {
    const pi=i/4, x=(pi%dw)+dx, y=Math.floor(pi/dw)+dy;
    const r=px.data[i],g=px.data[i+1],b=px.data[i+2],a=px.data[i+3];
    if (a<20||(r+g+b)/3<12&&Math.random()>.4) continue;
    particles.push(new P(x,y,`rgba(${r},${g},${b},${a/255})`));
  }
}

function drawLoop() {
  ctx.clearRect(0,0,W,H);
  ctx.globalAlpha=1;
  dissolve = Math.min(1, dissolve+.00035);
  particles.forEach(p=>{p.tick(dissolve);p.draw();});
  ctx.globalAlpha=1;
  raf = requestAnimationFrame(drawLoop);
}

/* ══════════════════════════════
   IMAGE
══════════════════════════════ */
function loadImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const img = new Image();
  img.onload = () => {
    imgEl=img; dissolve=0; spawnParticles();
    cancelAnimationFrame(raf); drawLoop();
    showChatUI();
  };
  img.src = URL.createObjectURL(file);
}

function showChatUI() {
  document.getElementById('upload-screen').style.display='none';
  document.getElementById('chat-layer').style.display='block';
  document.getElementById('input-bar').style.display='block';
  document.getElementById('upload-another').style.display='block';
  setTimeout(()=>greet(), 700);
}

function greet() {
  showBubble('こんにちは。この写真について、日本語で話してください。', 'Hi，用日语和我说说这张照片吧。', null);
  doTTS('こんにちは。この写真について、日本語で話してください。');
}

function resetUpload() {
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('chat-layer').style.display='none';
  document.getElementById('input-bar').style.display='none';
  document.getElementById('upload-another').style.display='none';
  hideBubble();
  cancelAnimationFrame(raf); ctx.clearRect(0,0,W,H);
  particles=[]; dissolve=0; imgEl=null;
  conversationHistory=[]; currentAiText=''; currentAudioURL=null;
  document.getElementById('file-input').value='';
}

function showChat() {}

/* ══════════════════════════════
   CONVERSATION
══════════════════════════════ */
const SYSTEM = `あなたは「話して」という日本語会話練習AIです。ユーザーが日本語で話しかけてきます。写真について、または自由に会話してください。

必ずこのJSON形式のみで返してください（コードブロック、前置き不要）：
{"reply":"日本語での返答","translation_zh":"中国語訳","correction":null}

correctionは誤りがある場合のみ：{"original":"誤り","corrected":"正しい表現","explanation_zh":"中国語の説明"}
返答は自然で温かく、会話が続くように。`;

let conversationHistory = [];
let currentAiText = '', currentZh = '', currentCorrection = null;
let currentAudioURL = null;
let memories = [];

async function callClaude(userText) {
  conversationHistory.push({role:'user', content: userText});
  const res = await fetch(API, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'chat',
      model:'claude-sonnet-4-20250514',
      max_tokens:800,
      system: SYSTEM,
      messages: conversationHistory
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const raw = data.content[0].text;
  let parsed;
  try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch { parsed = {reply:raw, translation_zh:'', correction:null}; }
  conversationHistory.push({role:'assistant', content: parsed.reply});
  return parsed;
}

async function doTTS(text) {
  setStatus('speaking');
  try {
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'tts', text})
    });
    if (!res.ok) throw new Error(`TTS HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudioURL = url;
    const audio = new Audio(url);
    audio.onended = () => setStatus('idle');
    audio.onerror = () => setStatus('idle');
    await audio.play();
  } catch(e) {
    console.error('TTS error:', e);
    setStatus('idle');
  }
}

async function processInput(text) {
  setStatus('thinking');
  showTyping();
  try {
    const parsed = await callClaude(text);
    currentAiText = parsed.reply;
    currentZh = parsed.translation_zh || '';
    currentCorrection = parsed.correction || null;
    currentAudioURL = null;
    showBubble(parsed.reply, parsed.translation_zh, parsed.correction);
    await doTTS(parsed.reply);
  } catch(e) {
    hideBubble();
    setStatus('idle');
    showToast('エラー: ' + e.message);
  }
}

function sendText() {
  const inp = document.getElementById('text-input');
  const t = inp.value.trim(); if (!t) return;
  inp.value = '';
  processInput(t);
}

/* ══════════════════════════════
   BUBBLE
══════════════════════════════ */
function showTyping() {
  const bt = document.getElementById('bubble-text');
  bt.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  bt.classList.add('visible');
  document.getElementById('bubble-actions').style.display='none';
  document.getElementById('correction-box').classList.remove('show');
  document.getElementById('translation-text').classList.remove('show');
}

function showBubble(text, zh, correction) {
  const bt = document.getElementById('bubble-text');
  bt.textContent = text; bt.classList.add('visible');
  document.getElementById('translation-text').textContent = zh||'';
  document.getElementById('translation-text').classList.remove('show');
  document.getElementById('trans-btn').textContent='中文';
  if (correction) {
    document.getElementById('corr-content').innerHTML =
      `<span class="corr-del">${esc(correction.original)}</span> → <span class="corr-ins">${esc(correction.corrected)}</span><div class="corr-exp">${esc(correction.explanation_zh)}</div>`;
    document.getElementById('correction-box').classList.add('show');
  } else {
    document.getElementById('correction-box').classList.remove('show');
  }
  document.getElementById('bubble-actions').style.display='flex';
  document.getElementById('save-btn').textContent='Save Memory ›';
}

function hideBubble() {
  document.getElementById('bubble-text').classList.remove('visible');
  document.getElementById('bubble-actions').style.display='none';
}

function toggleTrans() {
  const t=document.getElementById('translation-text');
  const btn=document.getElementById('trans-btn');
  const on=t.classList.toggle('show');
  btn.textContent=on?'中文 ▲':'中文';
}

function replayTTS() {
  if (currentAudioURL) {
    const audio=new Audio(currentAudioURL);
    setStatus('speaking');
    audio.onended=()=>setStatus('idle');
    audio.play();
  } else if (currentAiText) {
    doTTS(currentAiText);
  }
}

/* ══════════════════════════════
   MIC
══════════════════════════════ */
let recognition=null, isRec=false;

function toggleMic() { isRec ? stopRec() : startRec(); }

function startRec() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { showToast('このブラウザは音声入力に対応していません'); return; }
  recognition=new SR(); recognition.lang='ja-JP'; recognition.interimResults=true;
  recognition.onstart=()=>{ isRec=true; document.getElementById('mic-btn').classList.add('rec'); setStatus('listening'); };
  recognition.onresult=e=>{ document.getElementById('text-input').value=Array.from(e.results).map(r=>r[0].transcript).join(''); };
  recognition.onend=()=>{
    isRec=false; document.getElementById('mic-btn').classList.remove('rec'); setStatus('idle');
    const t=document.getElementById('text-input').value.trim();
    if(t){document.getElementById('text-input').value=''; processInput(t);}
  };
  recognition.onerror=()=>{ isRec=false; document.getElementById('mic-btn').classList.remove('rec'); setStatus('idle'); };
  recognition.start();
}

function stopRec() { if(recognition) recognition.stop(); }

/* ══════════════════════════════
   STATUS
══════════════════════════════ */
function setStatus(s) {
  const dot=document.getElementById('ai-dot');
  const label=document.getElementById('ai-status');
  dot.className='ai-dot';
  if(s==='speaking'){dot.classList.add('speaking');label.textContent='話しています';}
  else if(s==='listening'){dot.classList.add('listening');label.textContent='聞いています';}
  else if(s==='thinking'){dot.classList.add('thinking');label.textContent='考えています';}
  else{label.textContent='話して';}
}

/* ══════════════════════════════
   SAVE MEMORY
══════════════════════════════ */
function saveMemory() {
  if (!currentAiText) return;
  const thumb=document.createElement('canvas');
  thumb.width=canvas.width; thumb.height=canvas.height;
  thumb.getContext('2d').drawImage(canvas,0,0);
  const userText=conversationHistory.filter(m=>m.role==='user').slice(-1)[0]?.content||'';
  memories.unshift({
    id:Date.now(), timestamp:new Date().toLocaleString('ja-JP'),
    thumb, userText, aiText:currentAiText, zh:currentZh,
    correction:currentCorrection, audioURL:currentAudioURL
  });
  document.getElementById('save-btn').textContent='✓ Saved';
}

/* ══════════════════════════════
   MEMORY PANEL
══════════════════════════════ */
function openMemory() {
  const list=document.getElementById('memory-list');
  if(memories.length===0){
    list.innerHTML='<div class="no-memories">まだ記憶がありません<br>会話を保存してください</div>';
  } else {
    list.innerHTML=memories.map(m=>`
      <div class="memory-item" id="mi-${m.id}">
        <canvas class="mi-thumb" id="th-${m.id}" width="${m.thumb.width}" height="${m.thumb.height}"></canvas>
        <div class="mi-body">
          <div class="mi-time">${m.timestamp}</div>
          ${m.userText?`<div class="mi-label">あなた</div><div class="mi-user">${esc(m.userText)}</div>`:''}
          <div class="mi-label">AI · 話して</div>
          <div class="mi-ai">${esc(m.aiText)}</div>
          ${m.zh?`<div class="mi-zh">${esc(m.zh)}</div>`:''}
          ${m.correction?`<div class="mi-correction"><span style="color:#c45c3c;text-decoration:line-through">${esc(m.correction.original)}</span> → <span style="color:#6aab7a">${esc(m.correction.corrected)}</span><br><small>${esc(m.correction.explanation_zh)}</small></div>`:''}
          <div class="mi-actions">
            <button class="mi-btn" id="pb-${m.id}" onclick="playMem(${m.id})">▶ 再生</button>
            <button class="mi-btn" onclick="delMem(${m.id})">× 削除</button>
          </div>
        </div>
      </div>`).join('');
    memories.forEach(m=>{
      const c=document.getElementById(`th-${m.id}`);
      if(c) c.getContext('2d').drawImage(m.thumb,0,0);
    });
  }
  document.getElementById('memory-panel').classList.add('open');
}

function closeMemory(){document.getElementById('memory-panel').classList.remove('open');}

function playMem(id) {
  const m=memories.find(x=>x.id===id); if(!m) return;
  const btn=document.getElementById(`pb-${id}`);
  if(m.audioURL){
    btn.classList.add('playing'); btn.textContent='▶ 再生中';
    const a=new Audio(m.audioURL);
    a.onended=()=>{btn.classList.remove('playing');btn.textContent='▶ 再生';};
    a.play();
  } else {
    btn.classList.add('playing'); btn.textContent='▶ 再生中';
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'tts',text:m.aiText})})
      .then(r=>r.blob()).then(blob=>{
        const url=URL.createObjectURL(blob);
        m.audioURL=url;
        const a=new Audio(url);
        a.onended=()=>{btn.classList.remove('playing');btn.textContent='▶ 再生';};
        a.play();
      });
  }
}

function delMem(id){
  memories=memories.filter(m=>m.id!==id);
  document.getElementById(`mi-${id}`)?.remove();
  if(memories.length===0) document.getElementById('memory-list').innerHTML='<div class="no-memories">まだ記憶がありません</div>';
}

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}
</script>
